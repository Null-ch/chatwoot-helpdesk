services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot_pass
      POSTGRES_DB: chatwoot
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
  chatwoot:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DEFAULT_LOCALE: ru
      DATABASE_URL: postgres://chatwoot:chatwoot_pass@postgres:5432/chatwoot
      REDIS_URL: redis://redis:6379
      RAILS_LOG_TO_STDOUT: 'true'
    ports:
      - "${CHATWOOT_PORT:-3001}:3000"
    volumes:
      - chatwoot_storage:/app/storage
    command: bundle exec rails server -b 0.0.0.0 -p 3000
  sidekiq:
    image: chatwoot/chatwoot:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DATABASE_URL: postgres://chatwoot:chatwoot_pass@postgres:5432/chatwoot
      REDIS_URL: redis://redis:6379
    volumes:
      - chatwoot_storage:/app/storage
    command: bundle exec sidekiq
  bridge:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      CHATWOOT_URL: http://chatwoot:3000
      NODE_OPTIONS: --trace-warnings
    volumes:
      - ./src:/app/src
      - ./index.js:/app/index.js
      - bridge_state:/tmp
    ports:
      - "${BRIDGE_PORT:-3002}:3000"
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@webbor3mj.ru
      PGADMIN_DEFAULT_PASSWORD: "q*usjXi)"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      # For setups with dockerized reverse-proxy by virtual host labels
      VIRTUAL_HOST: cw-pgadmin.webbor3mj.ru
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: cw-pgadmin.webbor3mj.ru
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:
  bridge_state:
  pgadmin_data: